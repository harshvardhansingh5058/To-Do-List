<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            box-sizing: border-box;
        }

        /* ===== LIGHT MODE ===== */
        body {
            background-color: #f5f4f0;
            color: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== DARK MODE ===== */
        body.dark {
            background-color: #141414;
            color: #e8e4dc;
        }

        body.dark .to_do {
            background-color: #1c1c1c;
            border-color: #2a2a2a;
            box-shadow: none;
        }

        body.dark .create_box {
            border-color: #252525;
            background-color: #181818;
            box-shadow: none;
        }

        body.dark .input {
            border-color: #2e2e2e;
            background-color: #141414;
        }

        body.dark .input input {
            color: #e0dbd0;
            background-color: transparent;
        }

        body.dark .input input::placeholder {
            color: #4a4a4a;
        }

        body.dark .total_task,
        body.dark .completed,
        body.dark .pending {
            border-color: #252525;
            background-color: #181818;
            box-shadow: none;
            color: #9a9690;
        }

        body.dark .total_task span,
        body.dark .completed span,
        body.dark .pending span {
            color: #c8c3bb;
        }

        body.dark button {
            background-color: #242424;
            color: #c0bbb3;
            border-color: #2e2e2e;
        }

        body.dark button:hover {
            background-color: #2c2c2c;
        }

        body.dark .addtask {
            background-color: #b5c9b5;
            color: #1a221a;
            border-color: #b5c9b5;
        }

        body.dark .addtask:hover {
            background-color: #a4baa4;
            border-color: #a4baa4;
        }

        body.dark .task {
            background-color: #1c1c1c;
            border-color: #252525;
        }

        body.dark .task:hover {
            border-color: #323232;
            box-shadow: none;
        }

        body.dark .task span:not(.badge) {
            color: #ccc7be;
        }

        body.dark .task input[type="checkbox"] {
            accent-color: #b5c9b5;
        }

        body.dark .heading {
            color: #e0dbd0;
        }

        body.dark .second_heading {
            color: #4a4a4a;
        }

        body.dark .icon {
            color: #b5c9b5;
        }

        body.dark .toggle_icon {
            color: #3e3e3e;
        }

        body.dark .toggle_icon:hover {
            color: #7a7570;
        }

        body.dark .Low    { background: #1e2620; color: #7aab7a; }
        body.dark .Medium { background: #241e14; color: #b0884a; }
        body.dark .High   { background: #241616; color: #b06060; }

        /* ===== LAYOUT ===== */
        .main {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 16px;
        }

        .to_do {
            width: 70%;
            height: auto;
            background-color: #ffffff;
            box-shadow: 0px 2px 16px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding-bottom: 24px;
        }

        /* ===== HEADING ===== */
        .heading {
            gap: 10px;
            align-items: center;
            display: flex;
            padding: 24px 24px 0px 24px;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            position: relative;
        }

        .icon {
            color: purple;
        }

        .toggle_icon {
            display: flex;
            position: absolute;
            font-size: 20px;
            cursor: pointer;
            right: 5%;
            color: #888;
            transition: color 0.2s;
        }

        .toggle_icon:hover {
            color: #444;
        }

        /* ===== SUBTITLE ===== */
        .second_heading {
            align-items: center;
            display: flex;
            justify-content: center;
            font-size: 14px;
            font-weight: 400;
            color: #888;
            margin-top: 4px;
        }

        /* ===== INPUT BOX ===== */
        .create_box {
            box-shadow: 0px 0px 6px rgba(0, 0, 0, 0.08);
            padding: 16px;
            margin: 20px auto;
            width: 85%;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background-color: #fafaf8;
            border: 1px solid #ebebeb;
        }

        .input {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            border: 1px solid #ddd;
            padding: 10px 14px;
            border-radius: 10px;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }

        .input:focus-within {
            border-color: purple;
        }

        input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
            background: transparent;
        }

        /* ===== BUTTONS ===== */
        .buttons {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background-color: #f0f0f0;
            color: #333;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #e4e4e4;
        }

        button:active {
            transform: scale(0.97);
        }

        .addtask {
            background-color: purple;
            color: white;
            border-color: purple;
        }

        .addtask:hover {
            background-color: #5a0080;
        }

        /* ===== STATS ===== */
        .task_checker {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 24px;
            margin-bottom: 16px;
        }

        .total_task,
        .completed,
        .pending {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #ebebeb;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.06);
            background-color: #fafaf8;
        }

        .total_task i { color: purple; }
        .completed i  { color: #1d9e75; }
        .pending i    { color: #ba7517; }

        /* ===== TASK LIST ===== */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 24px;
        }

        /* ===== TASK ITEM ===== */
        .task {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #ebebeb;
            background-color: #fafaf8;
            transition: box-shadow 0.2s;
        }

        .task:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .task input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: purple;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task span:not(.badge) {
            flex: 1;
            font-size: 14px;
        }

        /* ===== PRIORITY BADGES ===== */
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .Low    { background: #eaf3de; color: #3b6d11; }
        .Medium { background: #faeeda; color: #854f0b; }
        .High   { background: #fcebeb; color: #a32d2d; }

        .task button {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="main">
        <div class="to_do">

            <!-- Heading -->
            <div class="heading">
                <i class="fa-solid fa-list-check icon"></i>
                My To-Do List
                <span class="toggle_icon" onclick="toggleDark()">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </span>
            </div>
            <div class="second_heading">Stay focused, stay organized</div>

            <!-- Input Box -->
            <div class="create_box">
                <div class="input">
                    <i class="fa-regular fa-pen-to-square" style="color: #aaa;"></i>
                    <input type="text" id="taskInput" placeholder="Add a new task..." />
                </div>
                <div class="buttons">
                    <select id="prioritySelect" style="padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; background-color: #f0f0f0; font-size: 13px; font-weight: 600; cursor: pointer; color: #333;">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                    <button class="addtask" onclick="addTask()">+ Add Task</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="task_checker">
                <div class="total_task">
                    <i class="fa-solid fa-layer-group"></i>
                    Total: <span id="totalCount">0</span>
                </div>
                <div class="completed">
                    <i class="fa-solid fa-circle-check"></i>
                    Done: <span id="doneCount">0</span>
                </div>
                <div class="pending">
                    <i class="fa-solid fa-clock"></i>
                    Pending: <span id="pendingCount">0</span>
                </div>
            </div>

            <!-- Task List -->
            <ul class="task-list" id="taskList"></ul>

        </div>
    </div>

    <script>
        let tasks = [];

        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (text === '') {
                alert('Please enter a task!');
                return;
            }

            tasks.push({ text: text, priority: priority, done: false });
            input.value = '';
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        function toggleDone(index) {
            tasks[index].done = !tasks[index].done;
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach(function(task, index) {
                const li = document.createElement('li');
                li.classList.add('task');

                li.innerHTML = `
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${index})">
                    <span style="${task.done ? 'text-decoration: line-through; color: #aaa;' : ''}">${task.text}</span>
                    <span class="badge ${task.priority}">${task.priority}</span>
                    <button onclick="deleteTask(${index})">Delete</button>
                `;

                list.appendChild(li);
            });

            // Update counts
            const total = tasks.length;
            const done = tasks.filter(t => t.done).length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('pendingCount').textContent = total - done;
        }

        // Enter key se bhi task add ho
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // Dark mode toggle
        function toggleDark() {
            document.body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>

</body>
</html>
